<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSrv &mdash; CGI Execution Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="nav-brand">WebSrv</div>
            <ul class="nav-links">
                <li><a href="../index.html" class="nav-link">Home</a></li>
                <li><a href="../index.html#features" class="nav-link">Capabilities</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="cgi-hero">
            <div class="cgi-container">
                <div class="cgi-header">
                    <h2>CGI Execution</h2>
                    <p>Upload and execute scripts on the server</p>
                </div>

                <div class="cgi-section">
                    <div class="cgi-controls">
                        <form method="POST" enctype="multipart/form-data" action="/cgi-bin/">
                            <div class="control-group">
                                <label for="scriptFile" class="control-label">
                                    Select Script <span class="required">*</span>
                                </label>
                                <input type="file" id="scriptFile" name="file" class="control-input" required>
                                <div class="input-hint">Choose any executable script to upload and run</div>
                            </div>

                            <button type="submit" class="execute-button">Upload & Execute</button>
                        </form>
                    </div>

                    <div class="cgi-controls" style="margin-top: 2rem;">
                        <form method="GET" action="/cgi-bin/hello.py">
                            <div class="control-group">
                                <label for="queryString" class="control-label">
                                    Execute Existing Script
                                </label>
                                <input type="text" id="queryString" name="test" class="control-input" placeholder="e.g., hello.py">
                                <div class="input-hint">Run a pre-existing script with query parameters</div>
                            </div>

                            <button type="submit" class="execute-button">Execute</button>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 WebSrv &mdash; 42 School</p>
    </footer>
</body>
</html>
